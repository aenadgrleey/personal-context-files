version: "1"

steps:
  - id: implement
    agent: worker
    task: |
      Implement the requested change:
      {{input}}
    output:
      kind: report
    tools:
      mode: allowlist
      allow: [read, bash, edit, write]

  - id: review
    agent: reviewer
    task: |
      Review the completed work.

      Implementation summary:
      {{steps.implement.summary}}

      Artifacts:
      {{steps.implement.artifacts}}

      Notes:
      {{steps.implement.notes}}
    output:
      kind: review
    review: true
