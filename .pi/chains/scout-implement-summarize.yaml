version: "1"

steps:
  - id: scout
    agent: scout
    task: |
      Scout the codebase for {{input}}.

      Return the key files and implementation constraints.
    output:
      kind: findings
    tools:
      mode: allowlist
      allow: [read, bash, grep, find, ls]

  - id: implement
    agent: worker
    task: |
      Implement {{input}}.

      Use these files as your starting point:
      {{steps.scout.files}}

      Important insights:
      {{steps.scout.insights}}
    output:
      kind: report
    tools:
      mode: allowlist
      allow: [read, bash, edit, write]

  - id: summarize
    agent: summarizer
    task: |
      Summarize the completed work for {{input}}.

      Summary:
      {{steps.implement.summary}}

      Artifacts:
      {{steps.implement.artifacts}}

      Notes:
      {{steps.implement.notes}}
    output:
      kind: report
