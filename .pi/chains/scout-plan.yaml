version: "1"

steps:
  - id: scout
    agent: scout
    task: |
      Scout the codebase for {{input}}.

      Focus on the most relevant files, symbols, and constraints.
    output:
      kind: findings
    tools:
      mode: allowlist
      allow: [read, bash, grep, find, ls]

  - id: plan
    agent: planner
    task: |
      Create an implementation plan for {{input}}.

      Relevant files:
      {{steps.scout.files}}

      Insights:
      {{steps.scout.insights}}
    output:
      kind: plan
    review: true
